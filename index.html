<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Artale-OOExp v5.3</title>
    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #111218; color: #e0e0e0; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 340px; background: #1a1c26; padding: 15px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; z-index: 1001; }
        #canvas-container { flex-grow: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        video { width: 100%; height: 100%; object-fit: contain; opacity: 0.15; }

        .author-tag-center { font-size: 11px; color: #888; text-align: center; padding: 2px 0; font-family: 'Consolas', monospace; letter-spacing: 2px; margin-bottom: 2px; opacity: 0.6; width: 100%; }

        .panel { background: #1e212b; border-radius: 8px; padding: 12px; border: 1px solid #2d313d; margin-bottom: 5px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .val { font-family: 'Consolas', monospace; color: #2ecc71; font-weight: bold; font-size: 16px; }
        .label { color: #bbb; }

        #drag-box { position: absolute; border: 2px solid #ff3e3e; background: rgba(255, 62, 62, 0.05); width: 121px; height: 19px; cursor: move; z-index: 999; box-sizing: border-box; outline: none; }
        #resizer { width: 12px; height: 12px; background: #ff3e3e; position: absolute; right: -6px; bottom: -6px; cursor: nwse-resize; border-radius: 50%; }
        #drag-box:focus { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }

        .ctrl-group { background: #1e212b; border-radius: 8px; padding: 12px; border: 1px solid #2d313d; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #3498db; margin: 10px 0; }
        #preview { width: 100%; background: #000; border: 1px solid #444; image-rendering: pixelated; margin: 5px 0; }
        
        button { background: #3498db; color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-size: 14px; margin-bottom: 2px; }
        button:hover { background: #2980b9; }
        .btn-pause { background: #f39c12; }
        .btn-pause.running { background: #e74c3c; }
        .btn-game { background: #9b59b6; }
        .btn-game.running { background: #8e44ad; border: 2px solid #f1c40f; }
        .btn-auto { background: #8e44ad; font-size: 10px; width: auto; padding: 4px 6px; margin: 0; border: 1px solid #ab47bc; flex-shrink: 0; }
        .btn-save-box { background: #27ae60; font-size: 11px; width: auto; padding: 2px 8px; margin: 0; }
        .btn-danger { background: #c0392b; font-size: 11px; padding: 4px 8px; margin-top: 8px; width: 100%; opacity: 0.8; }
        .btn-danger:hover { background: #e74c3c; opacity: 1; }
        
        .status-box { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #444; }
        .debug-text { font-size: 11px; font-family: monospace; margin-top: 4px; border-left: 2px solid #444; padding-left: 5px; }
        .optimizing { color: #f1c40f !important; animation: blink 1s infinite; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        .coord-display { position: absolute; bottom: -32px; left: 0; font-size: 10px; font-family: Consolas, monospace; color: #ff3e3e; white-space: nowrap; pointer-events: none; line-height: 1.3; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="author-tag-center">製作: OOKouun</div>

    <button id="mainBtn" onclick="start()">選取視窗</button>
    <button id="pauseBtn" class="btn-pause" onclick="togglePause()">暫停統計 (F7)</button>
    <button class="btn-reset" style="background:#3d4250; font-size:13px;" onclick="resetData()">重置統計數據 (F8)</button>
    <button id="gameModeBtn" class="btn-game" onclick="toggleGameMode()">🎮 開啟遊戲模式 (F9)</button>

    <div class="ctrl-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 5px;">
            <button class="btn-auto" onclick="autoOptimize()">自動偵測最佳OCR</button>
            <span style="font-size: 12px; white-space: nowrap;">💡 亮度: <b id="tVal">150</b></span>
            <button id="invertBtn" style="background:#444; width:auto; padding:4px 6px; font-size:10px; margin:0; flex-shrink: 0;" onclick="toggleInvert()">反白: 關</button>
        </div>

        <div style="display: flex; gap: 4px; flex-wrap: wrap;">
            <button class="btn-save-box" style="flex: 1;" onclick="saveCustomBox()">💾 儲存紅框</button>
            <button style="background:#444; width:auto; padding:2px 8px; font-size:11px; margin:0; flex: 1;" onclick="applyCustomBox()">還原紅框位置</button>
        </div>
        
        <button class="btn-danger" onclick="factoryReset()">重設所有設定為初始版本</button>
        
        <input type="range" id="threshold" min="80" max="225" value="150" oninput="updateT(this.value, true)" style="margin-top: 15px;">
        <canvas id="preview" height="40"></canvas>
        
        <div class="debug-text" style="color: #888;">原始內容: <span id="raw-log">--</span></div>
        <div class="debug-text" style="color: #5dade2; font-weight: bold;">提取數值: <span id="filter-log">--</span></div>
        
        <div class="status-box">
            <div class="debug-text">引擎狀態: <span id="engine-status" style="color:#f1c40f">等待啟動...</span></div>
            <div class="debug-text">OCR辨識信心度: <span id="ocr-conf" style="color:#eee">--</span></div>
        </div>
    </div>

    <div class="panel">
        <div class="row"><span class="label">統計時間</span><span id="stat-time" class="val" style="color:#eee">00:00:00</span></div>
        <div class="row"><span class="label">當前總經驗</span><span id="cur-exp" class="val" style="color:#3498db">0</span></div>
        <div class="row"><span class="label">累積獲得量</span><span id="total-gain" class="val">0</span></div>
        <div style="margin: 10px 0; border-top: 1px dashed #333;"></div>
        <div class="row"><span class="label">每分鐘 EXP</span><span id="epm" class="val">0</span></div>
        <div class="row"><span class="label">預估 10 分鐘</span><span id="e10" class="val">0</span></div>
        <div class="row"><span class="label">預估 60 分鐘</span><span id="e60" class="val">0</span></div>
    </div>

    <div class="ctrl-group">
        <div style="font-size: 13px;">⚡ 刷新率: <span id="gVal" style="color:#3498db">200</span> ms</div>
        <input type="range" id="gap" min="4" max="500" value="200" oninput="updateG(this.value, true)">
    </div>
</div>

<div id="canvas-container">
    <div id="drag-box" tabindex="0">
        <div id="resizer"></div>
        <div id="coord-display" class="coord-display">W:121, H:19<br>X:0, Y:0</div>
    </div>
    <video id="v" autoplay playsinline></video>
</div>

<script>
    const v = document.getElementById('v'), box = document.getElementById('drag-box'), pre = document.getElementById('preview');
    const preCtx = pre.getContext('2d', { willReadFrequently: true });
    const coordEl = document.getElementById('coord-display');
    let history = [], worker = null, isRunning = false, isPaused = false, isInverted = false;
    let startTime = null, totalPausedTime = 0, pauseStartedAt = null;
    let lastValidExp = 0, initialExp = 0, currentGap = 200, isOptimizing = false;
    
    // PiP 變數與 SVG 圖示
    let pipWindow = null;
    let currentPipOpacity = 0; 
    let pipVisibility = {}; // 儲存各列顯示狀態
    
    const eyeOpenSvg = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="#3498db" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const eyeClosedSvg = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    // 全局快捷鍵
    function handleGlobalKeys(e) {
        if (e.repeat) return;
        if (e.key === 'F7') { e.preventDefault(); togglePause(); }
        if (e.key === 'F8') { e.preventDefault(); resetData(); }
        if (e.key === 'F9') { e.preventDefault(); toggleGameMode(); }
    }
    window.addEventListener('keydown', handleGlobalKeys);

    function updateCoordDisplay() { 
        coordEl.innerHTML = `W:${box.offsetWidth}, H:${box.offsetHeight}<br>X:${parseInt(box.style.left) || 0}, Y:${parseInt(box.style.top) || 0}`; 
    }

    function saveSettings() {
        const config = {
            t: document.getElementById('threshold').value,
            g: document.getElementById('gap').value,
            inv: isInverted,
            pipOp: currentPipOpacity,
            pipVis: pipVisibility,
            box: { t: box.style.top, l: box.style.left, w: box.style.width, h: box.style.height }
        };
        localStorage.setItem('ocr_config_v4', JSON.stringify(config));
    }

    function saveCustomBox() {
        const b = { t: box.style.top, l: box.style.left, w: box.style.width, h: box.style.height };
        localStorage.setItem('v4_custom_box', JSON.stringify(b));
        const btn = document.querySelector('.btn-save-box');
        btn.innerText = "✅ 已儲存位置";
        setTimeout(() => btn.innerText = "💾 儲存紅框", 1500);
    }

    function applyCustomBox() {
        const saved = JSON.parse(localStorage.getItem('v4_custom_box'));
        if (saved && saved.t) { 
            box.style.top = saved.t; box.style.left = saved.l; box.style.width = saved.w; box.style.height = saved.h;
            updateCoordDisplay(); setTimeout(() => { renderPreview(); saveSettings(); }, 50); 
        } else { alert("找不到儲存的位置紀錄"); }
    }

    function factoryReset() {
        if (confirm("確定要清除所有儲存的紅框位置與設定，並恢復初始狀態嗎？\n此動作無法復原。")) {
            localStorage.removeItem('ocr_config_v4');
            localStorage.removeItem('v4_custom_box');
            location.reload();
        }
    }

    function loadSettings() {
        const saved = JSON.parse(localStorage.getItem('ocr_config_v4'));
        const custom = JSON.parse(localStorage.getItem('v4_custom_box'));
        if (saved) {
            updateT(saved.t || 150, false);
            updateG(saved.g || 200, false);
            currentPipOpacity = saved.pipOp !== undefined ? saved.pipOp : 0;
            pipVisibility = saved.pipVis || {};
            isInverted = !!saved.inv;
            document.getElementById('invertBtn').innerText = `反白: ${isInverted ? '開' : '關'}`;
            const target = (custom && custom.t) ? custom : saved.box;
            if (target) { Object.assign(box.style, target); }
            updateCoordDisplay();
        } else { updateCoordDisplay(); }
    }

    function updateT(val, s) { document.getElementById('tVal').innerText = val; document.getElementById('threshold').value = val; renderPreview(); if(s) saveSettings(); }
    function updateG(val, s) { document.getElementById('gVal').innerText = val; document.getElementById('gap').value = val; currentGap = parseInt(val); if(s) saveSettings(); }
    function toggleInvert() { isInverted = !isInverted; document.getElementById('invertBtn').innerText = `反白: ${isInverted ? '開' : '關'}`; renderPreview(); saveSettings(); }
    
    async function toggleGameMode() {
        const btn = document.getElementById('gameModeBtn');
        if (pipWindow) { pipWindow.close(); return; }
        try {
            if (!('documentPictureInPicture' in window)) { alert("目前瀏覽器不支援 Document PiP。"); return; }
            pipWindow = await documentPictureInPicture.requestWindow({ width: 230, height: 260 });
            
            const c = Math.floor(255 * currentPipOpacity);
            const tc = currentPipOpacity > 0.5 ? '#111' : '#e0e0e0';
            const lc = currentPipOpacity > 0.5 ? '#555' : '#bbb';
            const vc = currentPipOpacity > 0.5 ? '#008a3e' : '#2ecc71';
            const bc = currentPipOpacity > 0.5 ? '#ccc' : '#444';

            // 輔助函式：產生帶有隱藏按鈕的列
            const genRow = (id, labelTxt, valId, defaultTxt="0", valColor=vc) => {
                const isVis = pipVisibility[id] !== false;
                const eye = isVis ? eyeOpenSvg : eyeClosedSvg;
                const rowClass = isVis ? 'row' : 'row hidden-row';
                const styleStr = valId === 'p-stat-time' ? `style="color:${currentPipOpacity > 0.5 ? '#333' : '#eee'}"` : '';
                
                return `
                    <div class="${rowClass}" data-id="${id}">
                        <div class="label-group">
                            <span class="eye-btn">${eye}</span>
                            <span class="label">${labelTxt}</span>
                        </div>
                        <span id="${valId}" class="val" ${styleStr}>${defaultTxt}</span>
                    </div>
                `;
            };

            pipWindow.document.body.innerHTML = `
                <style>
                    body { font-family: "Microsoft JhengHei", Consolas, sans-serif; background: rgb(${c}, ${c}, ${c}); color: ${tc}; margin: 0; padding: 10px 14px; overflow: auto; user-select: none; transition: background 0.2s; }
                    ::-webkit-scrollbar { width: 5px; height: 5px; }
                    ::-webkit-scrollbar-thumb { background: ${bc}; border-radius: 3px; }
                    ::-webkit-scrollbar-track { background: transparent; }
                    
                    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; transition: 0.2s; }
                    .val { font-family: 'Consolas', monospace; color: ${vc}; font-weight: bold; font-size: 15px; }
                    .label { color: ${lc}; transition: 0.2s; }
                    .title-bar { text-align: center; color: ${lc}; font-size: 11px; margin-bottom: 8px; border-bottom: 1px dashed ${bc}; padding-bottom: 4px; opacity: 0.7; }
                    .divider { margin: 8px 0; border-top: 1px dashed ${bc}; }
                    
                    .pip-slider-container { display: flex; flex-direction: column; margin-bottom: 12px; }
                    .pip-slider-container div { display: flex; justify-content: space-between; font-size: 11px; color: ${lc}; margin-bottom: 4px; }
                    input[type=range] { width: 100%; cursor: pointer; accent-color: #3498db; margin: 0; }
                    
                    /* 隱藏/顯示功能專用 CSS */
                    .label-group { display: flex; align-items: center; gap: 6px; }
                    .eye-btn { cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.6; transition: 0.2s; padding: 2px; border-radius: 4px; }
                    .eye-btn:hover { opacity: 1; background: rgba(128,128,128,0.2); }
                    .eye-btn svg { display: block; }
                    
                    .hidden-row .val { display: none; }
                    .hidden-row .label { text-decoration: line-through; opacity: 0.4; }
                </style>
                <div class="title-bar">拖拉邊緣可縮放視窗</div>
                
                <div class="pip-slider-container">
                    <div><span class="label">背景深淺 (黑↔白)</span><span id="p-pipOpVal" class="val" style="font-size:11px;">${currentPipOpacity}</span></div>
                    <input type="range" id="p-pipOpacity" min="0" max="1" step="0.05" value="${currentPipOpacity}">
                </div>

                ${genRow('time', '時間', 'p-stat-time', '00:00:00')}
                ${genRow('curExp', '當前經驗', 'p-cur-exp')}
                ${genRow('totalGain', '累積獲得', 'p-total-gain')}
                <div class="divider"></div>
                ${genRow('epm', '每分鐘', 'p-epm')}
                ${genRow('e10', '10 分鐘', 'p-e10')}
                ${genRow('e60', '60 分鐘', 'p-e60')}
            `;

            const p = pipWindow.document;

            // 監聽拉桿事件
            p.getElementById('p-pipOpacity').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                currentPipOpacity = val;
                p.getElementById('p-pipOpVal').innerText = val;
                
                const nc = Math.floor(255 * val);
                const ntc = val > 0.5 ? '#111' : '#e0e0e0';
                const nlc = val > 0.5 ? '#555' : '#bbb';
                const nvc = val > 0.5 ? '#008a3e' : '#2ecc71';
                const nbc = val > 0.5 ? '#ccc' : '#444';

                p.body.style.background = `rgb(${nc}, ${nc}, ${nc})`; 
                p.body.style.color = ntc;
                p.querySelectorAll('.label').forEach(el => el.style.color = nlc);
                p.querySelectorAll('.val:not(#p-stat-time)').forEach(el => el.style.color = nvc); 
                p.querySelector('.title-bar').style.color = nlc;
                p.querySelector('.title-bar').style.borderBottomColor = nbc;
                p.querySelector('.divider').style.borderTopColor = nbc;
                
                p.getElementById('p-stat-time').style.color = val > 0.5 ? '#333' : '#eee';
                saveSettings();
            });

            // 監聽眼睛圖示點擊事件 (隱藏/顯示該列)
            p.body.addEventListener('click', (e) => {
                const btn = e.target.closest('.eye-btn');
                if (!btn) return;
                const row = btn.closest('.row');
                const id = row.dataset.id;
                
                // 切換狀態
                pipVisibility[id] = !(pipVisibility[id] !== false);
                
                if (pipVisibility[id]) {
                    row.classList.remove('hidden-row');
                    btn.innerHTML = eyeOpenSvg;
                } else {
                    row.classList.add('hidden-row');
                    btn.innerHTML = eyeClosedSvg;
                }
                saveSettings();
            });

            p.addEventListener('keydown', handleGlobalKeys);

            pipWindow.addEventListener("pagehide", () => {
                pipWindow = null;
                btn.innerText = "🎮 開啟遊戲模式 (F9)";
                btn.classList.remove('running');
            });

            btn.innerText = "❌ 關閉遊戲模式 (F9)";
            btn.classList.add('running');
            syncPiP(); 
        } catch (e) { console.error(e); }
    }

    function syncPiP() {
        if (!pipWindow) return;
        const p = pipWindow.document;
        p.getElementById('p-stat-time').innerText = document.getElementById('stat-time').innerText;
        p.getElementById('p-cur-exp').innerText = document.getElementById('cur-exp').innerText;
        p.getElementById('p-total-gain').innerText = document.getElementById('total-gain').innerText;
        p.getElementById('p-epm').innerText = document.getElementById('epm').innerText;
        p.getElementById('p-e10').innerText = document.getElementById('e10').innerText;
        p.getElementById('p-e60').innerText = document.getElementById('e60').innerText;
    }

    async function autoOptimize() {
        if (!isRunning || isOptimizing) return;
        isOptimizing = true;
        resetData(); 
        const statusEl = document.getElementById('engine-status');
        statusEl.classList.add('optimizing');
        let bestT = 150, maxConf = 0, bestInv = false;
        
        for (let invState of [true, false]) {
            isInverted = invState;
            for (let t = 80; t <= 225; t += 1) {
                updateT(t, false);
                await new Promise(r => setTimeout(r, 25)); 
                const { data: { confidence } } = await worker.recognize(pre);
                if (confidence > maxConf) { maxConf = confidence; bestT = t; bestInv = invState; }
                statusEl.innerText = `掃描中 | 最高: ${maxConf}%`;
                if (maxConf >= 99) break;
            }
            if (maxConf >= 99) break;
        }
        isInverted = bestInv;
        document.getElementById('invertBtn').innerText = `反白: ${isInverted ? '開' : '關'}`;
        updateT(bestT, true);
        statusEl.classList.remove('optimizing');
        statusEl.innerText = "優化完成";
        setTimeout(() => { isOptimizing = false; statusEl.innerText = "運作中"; loop(); }, 1500);
    }

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            v.srcObject = stream;
            if(!worker) {
                worker = await Tesseract.createWorker('eng');
                await worker.setParameters({ tessedit_char_whitelist: '0123456789[%]. ', tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE });
            }
            startTime = Date.now(); totalPausedTime = 0; isRunning = true; isPaused = false;
            document.getElementById('mainBtn').innerText = "視窗已連線";
            document.getElementById('engine-status').innerText = "運作中";
            loop();
            if(!window.intv) window.intv = setInterval(() => {
                if(!startTime || isPaused) return;
                const diff = Math.floor((Date.now() - startTime - totalPausedTime) / 1000);
                document.getElementById('stat-time').innerText = new Date(diff * 1000).toISOString().substr(11, 8);
                syncPiP(); 
            }, 1000);
        } catch(e) { document.getElementById('engine-status').innerText = "連線取消"; }
    }

    async function loop() {
        if (!isRunning || isPaused || isOptimizing) return;
        if (!renderPreview()) { setTimeout(loop, 500); return; }
        try {
            const { data: { text, confidence } } = await worker.recognize(pre);
            document.getElementById('ocr-conf').innerText = confidence + "%";
            let clean = text.trim().replace(/\s+/g, '').replace(/\(/g, '[').replace(/\[(\d+\.?\d*)%[^\]]*\]?/, '[$1%]');
            document.getElementById('raw-log').innerText = clean;

            const expM = clean.match(/^(\d+)/), pctM = clean.match(/\[(\d+\.?\d*)%\]/);
            document.getElementById('filter-log').innerText = expM ? `${expM[1]} [${pctM ? pctM[1] : '?'}%]` : "--";

            const nowE = parseInt(expM ? expM[1] : 0);
            if (nowE > 0) {
                if (lastValidExp === 0) { initialExp = nowE; lastValidExp = nowE; }
                const delta = nowE - lastValidExp;
                if (delta > 1000000) { document.getElementById('engine-status').innerText = "跳轉異常"; } 
                else if (delta >= 0) {
                    document.getElementById('engine-status').innerText = "運作中";
                    lastValidExp = nowE;
                    const nowT = Date.now();
                    history.push({ t: nowT, v: nowE });
                    history = history.filter(item => nowT - item.t <= 600000);
                    document.getElementById('cur-exp').innerText = nowE.toLocaleString();
                    document.getElementById('total-gain').innerText = (nowE - initialExp).toLocaleString();
                    if (history.length > 1) {
                        const f = history[0], l = history[history.length - 1];
                        const epm = Math.floor((l.v - f.v) / ((l.t - f.t) / 60000)) || 0;
                        document.getElementById('epm').innerText = epm.toLocaleString();
                        document.getElementById('e10').innerText = (epm * 10).toLocaleString();
                        document.getElementById('e60').innerText = (epm * 60).toLocaleString();
                    }
                    syncPiP(); 
                }
            }
        } catch (e) {}
        setTimeout(loop, currentGap);
    }

    function renderPreview() {
        if (v.readyState < 2) return false;
        const b = box.getBoundingClientRect(), vR = v.getBoundingClientRect(), ratio = v.videoWidth / v.videoHeight;
        let cw, ch;
        if (vR.width / vR.height > ratio) { ch = vR.height; cw = vR.height * ratio; } else { cw = vR.width; ch = vR.width / ratio; }
        const ox = (vR.width - cw) / 2, oy = (vR.height - ch) / 2, rx = v.videoWidth / cw, ry = v.videoHeight / ch;
        pre.width = b.width * 2; pre.height = b.height * 2;
        try { preCtx.drawImage(v, (b.left - vR.left - ox) * rx, (b.top - vR.top - oy) * ry, b.width * rx, b.height * ry, 0, 0, pre.width, pre.height); } catch(e) { return false; }
        let img = preCtx.getImageData(0, 0, pre.width, pre.height), d = img.data, th = parseInt(document.getElementById('threshold').value);
        for (let i = 0; i < d.length; i += 4) {
            let g = (d[i] + d[i+1] + d[i+2]) / 3 > th ? 255 : 0;
            if (isInverted) g = 255 - g;
            d[i] = d[i+1] = d[i+2] = g;
        }
        preCtx.putImageData(img, 0, 0); return true;
    }

    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pauseBtn');
        if (isPaused) { 
            btn.innerText = "恢復統計 (F7)"; 
            btn.classList.add('running'); 
            pauseStartedAt = Date.now(); 
        } else { 
            btn.innerText = "暫停統計 (F7)"; 
            btn.classList.remove('running'); 
            if (pauseStartedAt) totalPausedTime += (Date.now() - pauseStartedAt); 
            pauseStartedAt = null;
            loop(); 
        }
    }

    function resetData() {
        history = []; 
        startTime = Date.now(); 
        totalPausedTime = 0; 
        lastValidExp = 0; 
        initialExp = 0;
        
        let wasPaused = isPaused;
        isPaused = false;
        pauseStartedAt = null;
        
        const btn = document.getElementById('pauseBtn');
        if (btn) {
            btn.innerText = "暫停統計 (F7)";
            btn.classList.remove('running');
        }
        
        document.getElementById('cur-exp').innerText = "0";
        document.getElementById('total-gain').innerText = "0";
        document.getElementById('epm').innerText = "0";
        document.getElementById('e10').innerText = "0";
        document.getElementById('e60').innerText = "0";
        document.getElementById('stat-time').innerText = "00:00:00";
        
        syncPiP(); 
        
        if (isRunning && wasPaused && !isOptimizing) { loop(); }
    }

    let isD = false, isR = false, mx, my, mw, mh, ml, mt;
    box.onmousedown = (e) => { 
        if (e.target.id === 'resizer') isR = true; else isD = true; 
        mx = e.clientX; my = e.clientY; mw = box.offsetWidth; mh = box.offsetHeight; ml = parseInt(box.style.left) || 0; mt = parseInt(box.style.top) || 0;
        e.preventDefault(); box.focus(); 
    };
    document.onmousemove = (e) => { 
        if (isD) { box.style.left = (ml + e.clientX - mx) + 'px'; box.style.top = (mt + e.clientY - my) + 'px'; updateCoordDisplay(); } 
        else if (isR) { box.style.width = Math.max(10, mw + e.clientX - mx) + 'px'; box.style.height = Math.max(10, mh + e.clientY - my) + 'px'; updateCoordDisplay(); } 
        if (isD || isR) renderPreview(); 
    };
    document.onmouseup = () => { if(isD || isR) saveSettings(); isD = isR = false; };
    box.onkeydown = (e) => {
        const step = e.shiftKey ? 10 : 1;
        let l = parseInt(box.style.left) || 0, t = parseInt(box.style.top) || 0;
        if(e.key.startsWith('Arrow')) {
            e.preventDefault();
            if(e.key==='ArrowLeft') box.style.left=(l-step)+'px'; if(e.key==='ArrowRight') box.style.left=(l+step)+'px';
            if(e.key==='ArrowUp') box.style.top=(t-step)+'px'; if(e.key==='ArrowDown') box.style.top=(t+step)+'px';
            updateCoordDisplay(); renderPreview(); saveSettings();
        }
    };
    window.onload = loadSettings;
</script>
</body>
